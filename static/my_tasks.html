<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>我的盤點任務</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        .material-card { background: white; border-radius: 16px; border: 1px solid #e5e7eb; padding: 0.75rem; margin-bottom: 0.75rem; }
        .material-card.highlight { background-color: #fff3cd; }
        .touch-btn { min-height: 48px; font-size: 1rem; padding: 0.5rem 1rem; }
        .touch-input { font-size: 1rem; padding: 0.75rem; }
        #reader { width: 100%; max-width: 500px; margin-top: 10px; }
    </style>
</head>
<body class="bg-gray-100 p-4">
<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">📋 我的盤點任務</h1>
        <div>
            <button onclick="location.href='worker_dashboard.html'" class="bg-gray-500 text-white px-3 py-2 rounded text-sm">← 返回工作台</button>
            <button onclick="logout()" class="bg-red-500 text-white px-3 py-2 rounded text-sm ml-2">登出</button>
        </div>
    </div>

    <div id="taskList" class="bg-white rounded shadow p-4 mb-4">
        <div id="taskListContent" class="text-center py-4">載入中...</div>
    </div>

    <div id="workingArea" class="bg-white rounded shadow p-4 hidden">
        <div class="flex justify-between items-center mb-3">
            <h2 id="sheetTitle" class="text-lg font-bold"></h2>
            <button id="backBtn" class="bg-gray-500 text-white px-3 py-2 rounded text-sm">返回任務列表</button>
        </div>
        <div class="flex flex-wrap gap-2 mb-4 bg-gray-50 p-3 rounded">
            <input type="text" id="scanMaterialCode" placeholder="掃描或輸入料號 (按 Enter 定位)" class="border flex-1 p-3 rounded touch-input" autofocus>
            <input type="number" id="countedQty" placeholder="數量" value="1" class="border w-24 p-3 rounded touch-input" min="0">
            <button id="submitScanBtn" class="bg-green-600 text-white px-4 py-3 rounded touch-btn">提交盤點</button>
            <button id="cameraBtn" class="bg-purple-600 text-white px-4 py-3 rounded touch-btn">📷 掃描</button>
        </div>
        <div id="reader" class="hidden"></div>
        <div id="itemsContainer" class="max-h-96 overflow-auto">
            <div class="text-center py-8 text-gray-500">請選擇盤點單</div>
        </div>
        <button id="finishSheetBtn" class="mt-4 bg-blue-600 text-white w-full py-3 rounded-lg touch-btn">✅ 結束盤點</button>
    </div>
</div>

<script>
    const API_BASE = "/api/v1";
    let token = localStorage.getItem('access_token');
    if (!token) { alert('請先登入'); location.href = 'login.html'; }
    let currentUsername = localStorage.getItem('username') || '';
    let html5QrCode = null;
    let currentSheetNo = "";
    let currentItems = [];

    async function apiFetch(url, opts = {}) {
        opts.headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) };
        const res = await fetch(url, opts);
        if (res.status === 401) { alert('登入過期'); localStorage.removeItem('access_token'); location.href = 'login.html'; throw new Error('Unauthorized'); }
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }
    function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

    // 強化清理：移除控制字符、零寬空格、BOM 等
    function cleanMaterialCode(code) {
        if (!code) return '';
        // 移除非打印字符（除普通空格、字母、數字、連字符、底線、中文、日文等常見字符外）
        // 這裡簡化為：保留字母數字中文常見符號，移除其他控制字符
        return code.replace(/[\x00-\x1F\x7F\u200B-\u200F\uFEFF]/g, '').trim();
    }

    async function loadTasks() {
        try {
            const tasks = await apiFetch(`${API_BASE}/inventory/my-tasks`);
            const container = document.getElementById('taskListContent');
            if (!tasks.length) { container.innerHTML = '<div class="text-gray-400">暫無指派給您的盤點任務</div>'; return; }
            container.innerHTML = tasks.map(t => `
                <div class="border rounded p-3 mb-2 flex justify-between items-center">
                    <div><strong>${escapeHtml(t.sheet_no)}</strong> - 倉庫:${escapeHtml(t.warehouse)} 狀態:${t.status}</div>
                    <button class="start-sheet bg-green-600 text-white px-3 py-2 rounded text-sm touch-btn" data-sheet="${t.sheet_no}" data-status="${t.status}">開始盤點</button>
                </div>
            `).join('');
            document.querySelectorAll('.start-sheet').forEach(btn => {
                btn.onclick = async () => {
                    currentSheetNo = btn.dataset.sheet;
                    const currentStatus = btn.dataset.status;
                    try {
                        if (currentStatus !== '進行中') {
                            await apiFetch(`${API_BASE}/inventory/sheets/${currentSheetNo}/start`, { method: 'PATCH' });
                        }
                        await loadSheetItems();
                        document.getElementById('workingArea').classList.remove('hidden');
                        document.getElementById('taskList').classList.add('hidden');
                        document.getElementById('sheetTitle').innerHTML = `正在盤點：${currentSheetNo}`;
                        document.getElementById('scanMaterialCode').focus();
                        if (html5QrCode) {
                            await html5QrCode.stop().catch(console.warn);
                            html5QrCode = null;
                        }
                        document.getElementById('reader').classList.add('hidden');
                    } catch(e) {
                        if (e.message.includes('不允許開始')) {
                            await loadSheetItems();
                            document.getElementById('workingArea').classList.remove('hidden');
                            document.getElementById('taskList').classList.add('hidden');
                            document.getElementById('sheetTitle').innerHTML = `正在盤點：${currentSheetNo}`;
                            document.getElementById('scanMaterialCode').focus();
                        } else {
                            alert('開始盤點失敗: ' + e.message);
                        }
                    }
                };
            });
        } catch(e) { alert('載入任務失敗: ' + e.message); }
    }

    async function loadSheetItems() {
        try {
            const items = await apiFetch(`${API_BASE}/inventory/sheets/${currentSheetNo}/items`);
            const container = document.getElementById('itemsContainer');
            if (!items.length) { container.innerHTML = '<div class="text-center py-8 text-gray-500">無物料</div>'; currentItems = []; return; }
            currentItems = items.map(it => ({
                code: it.material_code,
                name: it.name,
                spec: it.spec,
                expected: it.expected_qty,
                counted: it.counted_qty || 0,
                diff: it.diff_qty || 0,
                status: it.status
            }));
            renderItems();
        } catch(e) { alert('載入明細失敗: ' + e.message); }
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        container.innerHTML = currentItems.map((item, idx) => `
            <div class="material-card" data-code="${escapeHtml(item.code)}" data-idx="${idx}">
                <div class="font-bold text-lg">${escapeHtml(item.code)} ${escapeHtml(item.name)}</div>
                <div class="text-gray-600 text-sm mb-1">規格：${escapeHtml(item.spec)}</div>
                <div class="flex justify-between items-center mb-2">
                    <span>賬面庫存：<span class="font-semibold">${item.expected}</span></span>
                    <span>目前實盤：<span class="counted-val">${item.counted}</span></span>
                    <span>差異：<span class="diff-val">${item.diff}</span></span>
                </div>
                <div class="flex flex-wrap gap-2 items-center">
                    <input type="number" class="count-input border rounded-lg p-2 w-28 text-center" value="${item.counted}" min="0" max="${item.expected}" data-idx="${idx}">
                    <button class="update-btn bg-blue-600 text-white px-3 py-2 rounded text-sm touch-btn" data-idx="${idx}">更新</button>
                </div>
                <div class="text-xs text-gray-500 mt-1">狀態：${item.status === '已盤' ? '✅ 已盤' : '⏳ 未盤'}</div>
            </div>
        `).join('');
        document.querySelectorAll('.update-btn').forEach(btn => {
            btn.onclick = async () => {
                const idx = btn.dataset.idx;
                const newCount = parseInt(document.querySelector(`.count-input[data-idx="${idx}"]`).value) || 0;
                await submitCount(currentItems[idx].code, newCount);
            };
        });
    }

    async function submitCount(materialCode, qty) {
        // 再次清理
        const cleanCode = cleanMaterialCode(materialCode);
        try {
            await apiFetch(`${API_BASE}/inventory/sheets/${currentSheetNo}/scan`, {
                method: 'POST',
                body: JSON.stringify({ material_code: cleanCode, counted_qty: qty, operator: currentUsername })
            });
            alert('盤點成功');
            await loadSheetItems();
        } catch(e) { alert('盤點失敗: ' + e.message); }
    }

    function handleScan(rawCode) {
        const cleanedCode = cleanMaterialCode(rawCode);
        if (!cleanedCode) return;
        // 在卡片中查找
        const card = document.querySelector(`.material-card[data-code="${escapeHtml(cleanedCode)}"]`);
        if (card) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.classList.add('highlight');
            setTimeout(() => card.classList.remove('highlight'), 1500);
            const input = card.querySelector('.count-input');
            if (input) input.focus();
            window.scannedCode = cleanedCode;
            document.getElementById('scanMaterialCode').value = cleanedCode;
        } else {
            alert(`找不到料號: ${cleanedCode} (已清理後)`);
            // 可以調試輸出實際字符
            console.log('掃描原始碼:', rawCode);
            console.log('清理後碼:', cleanedCode);
        }
    }

    async function startCamera() {
        if (html5QrCode) {
            try { await html5QrCode.stop(); } catch(e) { console.warn(e); }
            html5QrCode = null;
        }
        const readerDiv = document.getElementById('reader');
        readerDiv.classList.remove('hidden');
        readerDiv.innerHTML = `<div id="qr-reader" style="width:100%;"></div><button id="closeCameraBtn" class="mt-2 bg-gray-500 text-white px-3 py-2 rounded w-full">關閉相機</button>`;
        const qrReader = new Html5Qrcode("qr-reader");
        html5QrCode = qrReader;
        try {
            await qrReader.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    qrReader.stop().catch(console.warn);
                    readerDiv.classList.add('hidden');
                    readerDiv.innerHTML = '';
                    html5QrCode = null;
                    handleScan(decodedText);
                },
                (err) => {}
            );
            document.getElementById('closeCameraBtn').onclick = () => {
                qrReader.stop().catch(console.warn);
                readerDiv.classList.add('hidden');
                readerDiv.innerHTML = '';
                html5QrCode = null;
            };
        } catch(err) {
            alert('無法啟動相機: ' + err.message);
            readerDiv.classList.add('hidden');
            readerDiv.innerHTML = '';
            html5QrCode = null;
        }
    }

    document.getElementById('submitScanBtn').onclick = () => {
        let materialCode = document.getElementById('scanMaterialCode').value.trim();
        if (!materialCode && window.scannedCode) materialCode = window.scannedCode;
        if (!materialCode) { alert('請先掃描或輸入料號'); return; }
        const qty = parseInt(document.getElementById('countedQty').value);
        if (isNaN(qty) || qty < 0) { alert('請輸入有效數量'); return; }
        submitCount(materialCode, qty);
        document.getElementById('scanMaterialCode').value = '';
        document.getElementById('countedQty').value = '1';
        window.scannedCode = null;
    };
    document.getElementById('scanMaterialCode').onkeypress = (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const code = e.target.value.trim();
            if (code) handleScan(code);
            e.target.value = '';
        }
    };
    document.getElementById('cameraBtn').onclick = () => { startCamera(); };
    document.getElementById('backBtn').onclick = () => {
        document.getElementById('workingArea').classList.add('hidden');
        document.getElementById('taskList').classList.remove('hidden');
        if (html5QrCode) {
            html5QrCode.stop().catch(console.warn);
            html5QrCode = null;
        }
        document.getElementById('reader').classList.add('hidden');
        document.getElementById('reader').innerHTML = '';
        loadTasks();
    };
    document.getElementById('finishSheetBtn').onclick = async () => {
        if (confirm('確定結束盤點？結束後不可再修改。')) {
            try {
                await apiFetch(`${API_BASE}/inventory/sheets/${currentSheetNo}/finish`, { method: 'PATCH' });
                alert('盤點結束');
                document.getElementById('workingArea').classList.add('hidden');
                document.getElementById('taskList').classList.remove('hidden');
                if (html5QrCode) {
                    html5QrCode.stop().catch(console.warn);
                    html5QrCode = null;
                }
                document.getElementById('reader').classList.add('hidden');
                document.getElementById('reader').innerHTML = '';
                loadTasks();
            } catch(e) { alert('結束失敗: ' + e.message); }
        }
    };
    window.logout = () => { localStorage.clear(); location.href = 'login.html'; };
    loadTasks();
</script>
</body>
</html>
