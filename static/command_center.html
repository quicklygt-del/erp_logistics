<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>指揮塔 - 任務監控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .sticky-header th { position: sticky; top: 0; background-color: #f9fafb; }
        .data-table {
            table-layout: fixed;
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            border: 1px solid #e5e7eb;
            padding: 0.5rem;
            text-align: left;
            vertical-align: top;
            word-break: break-word;
        }
        .data-table th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        /* 手机优化 */
        @media (max-width: 640px) {
            .task-card { padding: 0.75rem; }
            .task-icon { font-size: 1.8rem; }
            .task-title { font-size: 1rem; }
            .task-count { font-size: 1.5rem; }
            .worker-card { padding: 0.75rem; }
            .alert-section { margin-top: 1rem; }
            .btn-mobile { padding: 0.6rem 1rem; font-size: 0.9rem; }
            .stat-label { font-size: 0.75rem; }
        }
        .menu-panel {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 12px rgba(0,0,0,0.15);
            z-index: 50;
            transition: right 0.3s ease;
            padding-top: 70px;
        }
        .menu-panel.open { right: 0; }
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 40;
            display: none;
        }
        .menu-overlay.show { display: block; }
        .floating-refresh {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #3b82f6;
            color: white;
            border-radius: 9999px;
            padding: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 30;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .floating-refresh:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-100 p-4">
<!-- 側邊選單遮罩 -->
<div id="menuOverlay" class="menu-overlay" onclick="closeMenu()"></div>
<!-- 側邊選單 -->
<div id="menuPanel" class="menu-panel">
    <div class="px-4 py-2 border-b"><h3 class="text-lg font-bold">功能選單</h3></div>
    <div class="flex flex-col">
        <a href="materials_dashboard.html" class="block px-4 py-3 hover:bg-gray-100 border-b">📦 物料主檔</a>
        <a href="stock_query.html" class="block px-4 py-3 hover:bg-gray-100 border-b">📊 庫存查詢</a>
        <a href="history.html" class="block px-4 py-3 hover:bg-gray-100 border-b">📜 歷史紀錄</a>
        <a href="reprint_qr.html" class="block px-4 py-3 hover:bg-gray-100 border-b">🖨️ QR列印</a>
        <button onclick="logout()" class="text-left px-4 py-3 hover:bg-gray-100 border-b text-red-600">🔓 登出</button>
    </div>
</div>

<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">🏭 指揮塔</h1>
        <button id="menuBtn" class="bg-gray-200 p-2 rounded-full w-12 h-12 flex items-center justify-center text-xl">☰</button>
    </div>

    <!-- 三任務卡片（垂直排列） -->
    <div class="grid grid-cols-1 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow p-4 card-hover cursor-pointer flex justify-between items-center" onclick="location.href='inbound_manage.html'">
            <div class="flex items-center gap-3">
                <div class="text-3xl">📥</div>
                <div>
                    <h2 class="text-lg font-bold text-blue-600">入庫任務</h2>
                    <p class="text-gray-500 text-sm">待指派/進行中</p>
                </div>
            </div>
            <span id="inboundCount" class="text-2xl font-bold text-gray-700">-</span>
        </div>
        <div class="bg-white rounded-xl shadow p-4 card-hover cursor-pointer flex justify-between items-center" onclick="location.href='pick_management.html'">
            <div class="flex items-center gap-3">
                <div class="text-3xl">📦</div>
                <div>
                    <h2 class="text-lg font-bold text-green-600">檢貨任務</h2>
                    <p class="text-gray-500 text-sm">待指派/進行中</p>
                </div>
            </div>
            <span id="pickingCount" class="text-2xl font-bold text-gray-700">-</span>
        </div>
        <div class="bg-white rounded-xl shadow p-4 card-hover cursor-pointer flex justify-between items-center" onclick="location.href='manage_tasks.html'">
            <div class="flex items-center gap-3">
                <div class="text-3xl">📋</div>
                <div>
                    <h2 class="text-lg font-bold text-purple-600">盤點任務</h2>
                    <p class="text-gray-500 text-sm">待指派/進行中</p>
                </div>
            </div>
            <span id="stocktakeCount" class="text-2xl font-bold text-gray-700">-</span>
        </div>
    </div>

    <!-- 倉管員當前負載（卡片式） -->
    <div class="bg-white rounded-xl shadow p-4 mb-6">
        <h2 class="text-lg font-bold mb-3">👥 倉管員當前負載</h2>
        <div id="workerLoadContainer" class="space-y-3">
            <div class="text-center py-4 text-gray-500">載入中...</div>
        </div>
    </div>

    <!-- 庫存預警卡片（預設折疊） -->
    <div class="bg-white rounded-xl shadow p-4 mb-6">
        <div class="flex justify-between items-center cursor-pointer" onclick="toggleAlert('stockAlert')">
            <h2 class="text-lg font-bold">⚠️ 庫存預警 (低於安全庫存)</h2>
            <span id="stockAlertIcon" class="text-xl">▼</span>
        </div>
        <div id="stockAlertContent" class="mt-2 hidden">
            <div class="overflow-x-auto max-h-64 overflow-y-auto">
                <table class="data-table stock-table text-sm">
                    <thead class="sticky-header">
                        <tr><th>料號</th><th>品名</th><th>主儲倉庫存</th><th>安全庫存</th><th>儲位</th></tr>
                    </thead>
                    <tbody id="lowStockPreviewTbody">
                        <tr><td colspan="5" class="text-center py-4">載入中...</tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 停留超時預警（預設折疊） -->
    <div class="bg-white rounded-xl shadow p-4">
        <div class="flex justify-between items-center cursor-pointer" onclick="toggleAlert('timeoutAlert')">
            <h2 class="text-lg font-bold">⏰ 停留超時預警</h2>
            <span id="timeoutAlertIcon" class="text-xl">▼</span>
        </div>
        <div id="timeoutAlertContent" class="mt-2 hidden">
            <div class="overflow-x-auto max-h-64 overflow-y-auto">
                <table class="data-table timeout-table text-sm">
                    <thead class="sticky-header">
                        <tr><th>單據/箱號</th><th>節點</th><th>已停留(小時)</th></tr>
                    </thead>
                    <tbody id="timeoutPreviewTbody">
                        <tr><td colspan="3" class="text-center py-4">載入中...</tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 浮動重新整理按鈕 -->
    <div id="floatingRefresh" class="floating-refresh touch-btn">
        <i class="fas fa-sync-alt"></i>
    </div>
</div>

<script>
    const API_BASE = "/api/v1";
    const ALLOWED_ROLES = ['admin', 'warehouse'];
    let authRedirecting = false;

    function getToken() { return localStorage.getItem('access_token'); }

    function checkAccess() {
        const token = getToken();
        if (!token) { alert('請先登入'); location.href = 'login.html'; return false; }
        const role = localStorage.getItem('user_role');
        if (role && !ALLOWED_ROLES.includes(role)) {
            alert('此頁面僅限倉儲主管或管理員使用，請重新登入');
            location.href = 'login.html';
            return false;
        }
        return true;
    }

    function closeMenu() {
        document.getElementById('menuPanel').classList.remove('open');
        document.getElementById('menuOverlay').classList.remove('show');
    }
    document.getElementById('menuBtn').onclick = () => {
        document.getElementById('menuPanel').classList.add('open');
        document.getElementById('menuOverlay').classList.add('show');
    };

    function toggleAlert(type) {
        const content = document.getElementById(`${type}Content`);
        const icon = document.getElementById(`${type}Icon`);
        if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            icon.innerHTML = '▲';
        } else {
            content.classList.add('hidden');
            icon.innerHTML = '▼';
        }
    }

    function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

    async function apiFetch(url, opts = {}) {
        const token = getToken();
        if (!token) { if (!authRedirecting) { authRedirecting = true; alert('請先登入'); localStorage.removeItem('access_token'); location.href = 'login.html'; } throw new Error('Unauthorized'); }
        opts.headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) };
        const res = await fetch(url, opts);
        if (res.status === 401) { if (!authRedirecting) { authRedirecting = true; alert('登入過期，請重新登入'); localStorage.removeItem('access_token'); location.href = 'login.html'; } throw new Error('Unauthorized'); }
        if (res.status === 403) throw new Error(await res.text());
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function loadSummary() {
        try {
            const data = await apiFetch(`${API_BASE}/dashboard/task-summary`);
            document.getElementById('inboundCount').innerText = data.inbound_pending || 0;
            document.getElementById('pickingCount').innerText = data.picking_pending || 0;
            document.getElementById('stocktakeCount').innerText = data.stocktake_pending || 0;
            const container = document.getElementById('workerLoadContainer');
            if (!data.worker_load || data.worker_load.length === 0) {
                container.innerHTML = '<div class="text-center py-4 text-gray-500">暫無指派任務</div>';
                return;
            }
            container.innerHTML = data.worker_load.map(w => `
                <div class="worker-card bg-gray-50 rounded-lg p-3 border">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-md">${escapeHtml(w.assigned_to)}</span>
                        <span class="text-sm">合計: ${w.task_count} 件</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mt-2 text-center text-sm">
                        <div><span class="text-blue-600">📥</span> 入庫 ${w.inbound_count}</div>
                        <div><span class="text-green-600">📦</span> 檢貨 ${w.picking_count}</div>
                        <div><span class="text-purple-600">📋</span> 盤點 ${w.stocktake_count}</div>
                    </div>
                    <button class="view-tasks bg-blue-500 text-white px-3 py-1 rounded text-xs mt-2 w-full touch-btn" data-worker="${escapeHtml(w.assigned_to)}">查看任務</button>
                </div>
            `).join('');
            document.querySelectorAll('.view-tasks').forEach(btn => {
                btn.onclick = () => {
                    const workerName = btn.dataset.worker;
                    window.open(`/worker_dashboard.html?user=${encodeURIComponent(workerName)}`, '_blank');
                };
            });
        } catch(e) { console.error(e); alert('載入任務摘要失敗: ' + e.message); }
    }

    async function loadAlerts() {
        try {
            const data = await apiFetch(`${API_BASE}/admin/dashboard/overview`);
            const lowStock = data.low_stock_items ? data.low_stock_items.slice(0, 5) : [];
            const lowStockTbody = document.getElementById('lowStockPreviewTbody');
            if (lowStock.length === 0) {
                lowStockTbody.innerHTML = '</td><td colspan="5" class="text-center py-4">✅ 暫無低於安全庫存物料</tbody>';
            } else {
                lowStockTbody.innerHTML = lowStock.map(item => `
                    <table>
                        <td class="p-2">${escapeHtml(item.material_code)}</td>
                        <td class="p-2">${escapeHtml(item.name)}</td>
                        <td class="p-2 text-center">${item.main_stock}</td>
                        <td class="p-2 text-center">${item.safety_stock}</td>
                        <td class="p-2">${escapeHtml(item.location || '')}</td>
                    </tr>
                `).join('');
            }
            const timeout = data.timeout_alerts ? data.timeout_alerts.slice(0, 5) : [];
            const timeoutTbody = document.getElementById('timeoutPreviewTbody');
            if (timeout.length === 0) {
                timeoutTbody.innerHTML = '<tr><td colspan="3" class="text-center py-4">✅ 暫無超時停留單據</tbody>';
            } else {
                timeoutTbody.innerHTML = timeout.map(alert => `
                    <tr>
                        <td class="p-2">${escapeHtml(alert.doc_number || alert.box_number || '-')}</td>
                        <td class="p-2">${escapeHtml(alert.node_type)}</td>
                        <td class="p-2 text-center">${alert.waiting_hours}</td>
                    </tr>
                `).join('');
            }
        } catch(e) { console.error(e); }
    }

    function logout() { localStorage.clear(); location.href = 'login.html'; }

    if (checkAccess()) {
        loadSummary();
        loadAlerts();
        document.getElementById('floatingRefresh').onclick = () => { loadSummary(); loadAlerts(); };
        setInterval(() => { loadSummary(); loadAlerts(); }, 30000);
    }
</script>
</body>
</html>
