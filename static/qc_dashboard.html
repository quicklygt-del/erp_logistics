<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品保工作台 - IQC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        /* 加深表格文字颜色 */
        .inspect-table td, .inspect-table th {
            color: #1f2937; /* gray-800 */
            border-color: #d1d5db;
        }
        .inspect-table input {
            color: #111827;
            background-color: #fff;
        }
        .clear-btn {
            background-color: #e5e7eb;
            color: #1f2937;
        }
        .clear-btn:hover {
            background-color: #d1d5db;
        }
    </style>
</head>
<body class="bg-gray-100">
<div class="container mx-auto px-4 py-6 max-w-7xl">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">🔬 品保工作台</h1>
        <div class="space-x-2">
            <a href="stock_query.html" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">庫存查詢</a>
            <a href="history.html" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">歷史紀錄</a>
            <a href="reprint_qr.html" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">QR列印</a>
            <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded text-sm">登出</button>
        </div>
    </div>

    <!-- 品保 IQC 面板 -->
    <div id="iqcPanel" style="display:block;">
        <div class="bg-white p-5 rounded shadow">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-xl font-bold">🔬 品保 IQC</h2>
                <button id="refreshPendingBtn" class="bg-blue-600 text-white px-3 py-1 rounded">重新整理待驗</button>
            </div>
            <div class="grid md:grid-cols-3 gap-4">
                <div class="border rounded p-2">
                    <div id="pendingDocList" class="max-h-96 overflow-auto">載入中...</div>
                </div>
                <div class="md:col-span-2 border rounded p-2">
                    <div id="inspectDetailArea" class="text-center text-gray-400 py-8">請選擇待驗單據</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "/api/v1";
    let token = localStorage.getItem('access_token');
    if (!token) { alert('請先登入'); location.href = 'login.html'; }

    async function apiFetch(url, opts = {}) {
        opts.headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
            ...(opts.headers || {})
        };
        const res = await fetch(url, opts);
        if (res.status === 401) {
            alert('登入過期，請重新登入');
            localStorage.removeItem('access_token');
            location.href = 'login.html';
            throw new Error('Unauthorized');
        }
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

    async function loadPending() {
        try {
            const docs = await apiFetch(`${API_BASE}/quality/pending`);
            const container = document.getElementById('pendingDocList');
            if (!docs.length) {
                container.innerHTML = '<div class="text-gray-400 text-center py-4">無待驗單據</div>';
                return;
            }
            container.innerHTML = docs.map(d => `
                <div class="border rounded p-2 mb-2 cursor-pointer hover:bg-gray-100 pending-item" data-doc="${escapeHtml(d.doc_number)}">
                    <div class="font-mono">${escapeHtml(d.doc_number)}</div>
                    <div class="text-sm text-gray-500">${d.doc_type === 'purchase' ? '採購' : '製令'}</div>
                </div>
            `).join('');
            document.querySelectorAll('.pending-item').forEach(el => el.addEventListener('click', () => loadPendingDetails(el.dataset.doc)));
        } catch(e) { console.error(e); }
    }

    async function loadPendingDetails(docNumber) {
        try {
            const data = await apiFetch(`${API_BASE}/quality/pending/${docNumber}`);
            const details = data.details || [];
            if (!details.length) {
                document.getElementById('inspectDetailArea').innerHTML = '<div class="text-center py-8 text-gray-400">該單據無明細</div>';
                return;
            }
            let html = `
                <div class="mb-3 flex gap-2 items-center">
                    <input type="text" id="scanMaterialInput" placeholder="掃描或輸入料號 (按Enter定位)" class="border flex-1 p-2 rounded" autofocus>
                    <button id="iqcScanMaterialBtn" class="bg-purple-600 text-white px-3 py-2 rounded">📷 掃描</button>
                </div>
                <div class="overflow-x-auto max-h-96">
                    <table class="min-w-full border text-sm inspect-table">
                        <thead class="bg-gray-50">
                            <tr><th class="p-2">料號</th><th class="p-2">品名</th><th class="p-2">規格</th><th class="p-2">已收數量</th><th class="p-2">良品數量</th><th class="p-2">不良數量</th><th class="p-2">操作</th></tr>
                        </thead>
                        <tbody id="inspectItemsBody"></tbody>
                    </table>
                </div>
                <div class="mt-3 flex justify-end"><button id="submitIQC" class="bg-green-600 text-white px-5 py-2 rounded">✅ 確認檢驗</button></div>
            `;
            document.getElementById('inspectDetailArea').innerHTML = html;

            const tbody = document.getElementById('inspectItemsBody');
            const originalQtys = {};
            tbody.innerHTML = details.map(d => {
                const originalQty = d.accepted_qty || d.required_qty || 0;
                originalQtys[d.material_code] = originalQty;
                return `
                    <tr data-code="${escapeHtml(d.material_code)}" class="border-b">
                        <td class="p-2 font-mono">${escapeHtml(d.material_code)}</td>
                        <td class="p-2">${escapeHtml(d.material_name || '')}</td>
                        <td class="p-2">${escapeHtml(d.spec || '')}</td>
                        <td class="p-2 text-center">${originalQty}</td>
                        <td class="p-2"><input type="number" class="pass-qty w-20 border text-center" data-code="${escapeHtml(d.material_code)}" value="0" min="0" step="1" onfocus="this.select()"></td>
                        <td class="p-2"><input type="number" class="fail-qty w-20 border text-center" data-code="${escapeHtml(d.material_code)}" value="0" min="0" step="1" onfocus="this.select()"></td>
                        <td class="p-2"><button class="clear-row clear-btn px-2 py-1 rounded text-xs" data-code="${escapeHtml(d.material_code)}">清除輸入</button></td>
                    </td>
                `;
            }).join('');

            const passInputs = document.querySelectorAll('.pass-qty');
            const failInputs = document.querySelectorAll('.fail-qty');
            const updateByPass = (passInp, failInp, originalQty) => {
                let passVal = parseInt(passInp.value) || 0;
                if (passVal > originalQty) passVal = originalQty;
                passInp.value = passVal;
                failInp.value = originalQty - passVal;
            };
            const updateByFail = (failInp, passInp, originalQty) => {
                let failVal = parseInt(failInp.value) || 0;
                if (failVal > originalQty) failVal = originalQty;
                failInp.value = failVal;
                passInp.value = originalQty - failVal;
            };
            passInputs.forEach(inp => {
                const code = inp.dataset.code;
                const originalQty = originalQtys[code];
                const failInp = document.querySelector(`.fail-qty[data-code="${code}"]`);
                inp.addEventListener('change', () => updateByPass(inp, failInp, originalQty));
                inp.addEventListener('input', () => updateByPass(inp, failInp, originalQty));
            });
            failInputs.forEach(inp => {
                const code = inp.dataset.code;
                const originalQty = originalQtys[code];
                const passInp = document.querySelector(`.pass-qty[data-code="${code}"]`);
                inp.addEventListener('change', () => updateByFail(inp, passInp, originalQty));
                inp.addEventListener('input', () => updateByFail(inp, passInp, originalQty));
            });
            // 清除按钮仅清除输入框的值，不清除任何数据
            document.querySelectorAll('.clear-row').forEach(btn => {
                btn.onclick = () => {
                    const code = btn.dataset.code;
                    const passInp = document.querySelector(`.pass-qty[data-code="${code}"]`);
                    const failInp = document.querySelector(`.fail-qty[data-code="${code}"]`);
                    passInp.value = 0;
                    failInp.value = 0;
                };
            });

            const inspectArea = document.getElementById('inspectDetailArea');
            const scanInput = inspectArea.querySelector('#scanMaterialInput');
            const scanBtn = inspectArea.querySelector('#iqcScanMaterialBtn');
            const scrollToRow = (code) => {
                const row = [...document.querySelectorAll('#inspectItemsBody tr')].find(r => r.dataset.code === code);
                if (row) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.style.backgroundColor = '#fff3cd';
                    setTimeout(() => row.style.backgroundColor = '', 1000);
                    const passInput = row.querySelector('.pass-qty');
                    if (passInput) passInput.focus();
                } else { alert(`找不到料號: ${code}`); }
            };
            scanInput.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    scrollToRow(scanInput.value.trim());
                    scanInput.value = '';
                }
            };
            scanBtn.onclick = () => {
                scrollToRow(scanInput.value.trim());
                scanInput.value = '';
            };

            document.getElementById('submitIQC').onclick = async () => {
                const items = [];
                for (let row of document.querySelectorAll('#inspectItemsBody tr')) {
                    const code = row.dataset.code;
                    const passVal = parseInt(row.querySelector('.pass-qty').value) || 0;
                    const failVal = parseInt(row.querySelector('.fail-qty').value) || 0;
                    items.push({ material_code: code, pass_qty: passVal, fail_qty: failVal });
                }
                if (items.length === 0) { alert('無檢驗項目'); return; }
                const operator = localStorage.getItem('username') || 'qc';
                try {
                    const res = await fetch(`${API_BASE}/quality/${docNumber}/inspect`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ operator, items })
                    });
                    if (res.ok) {
                        alert('檢驗完成，單據已轉為檢驗完成');
                        loadPending();
                        document.getElementById('inspectDetailArea').innerHTML = '<div class="text-center py-8 text-gray-400">檢驗完成，可選擇下一筆</div>';
                    } else {
                        const err = await res.json();
                        alert(`檢驗失敗: ${err.detail}`);
                    }
                } catch(e) { alert(`請求錯誤: ${e.message}`); }
            };
        } catch(e) { alert('載入明細失敗'); }
    }

    document.getElementById('refreshPendingBtn').onclick = loadPending;
    function logout() { localStorage.clear(); location.href = 'login.html'; }

    loadPending();
</script>
</body>
</html>
