<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>倉管員工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            border: 1px solid #e5e7eb;
            padding: 0.5rem;
            text-align: left;
            vertical-align: top;
        }
        .data-table th {
            background-color: #f9fafb;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">📦 倉管員工作台</h1>
        <div class="space-x-2">
            <a href="stock_query.html" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">📊 庫存查詢</a>
            <a href="history.html" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">📜 歷史紀錄</a>
            <a href="reprint_qr.html" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">🖨️ QR列印</a>
            <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded text-sm">登出</button>
        </div>
    </div>

    <p class="text-gray-600 mb-6" id="welcomeMessage">載入中...</p>

    <!-- 任務統計卡片（新增） -->
    <div id="taskStats" class="bg-white rounded-xl shadow p-5 mb-8" style="display: none;">
        <h2 class="text-xl font-bold mb-3">📊 任務統計</h2>
        <table class="data-table">
            <thead>
                <tr><th>任務類型</th><th>待處理數量</th> </thead>
            <tbody id="statsTableBody">
                <tr><td>入庫任務</td><td id="inboundStat">-</td></tr>
                <tr><td>檢貨任務</td><td id="pickingStat">-</td></tr>
                <tr><td>盤點任務</td><td id="stocktakeStat">-</td></tr>
                <tr class="font-bold"><td>合計</td><td id="totalStat">-</td></tr>
            </tbody>
        </table>
        <div class="mt-3 text-sm text-gray-500">※ 僅顯示未完成的任務數量</div>
    </div>

    <!-- 任務卡片區 -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-white rounded-xl shadow p-5 card-hover cursor-pointer" onclick="redirectWithUser('my_inbound_tasks.html')">
            <div class="text-4xl mb-2">📥</div>
            <h2 class="text-xl font-bold text-blue-600">我的入庫任務</h2>
            <p class="text-gray-500 mt-1">執行入庫作業</p>
        </div>
        <div class="bg-white rounded-xl shadow p-5 card-hover cursor-pointer" onclick="redirectWithUser('my_picking_tasks.html')">
            <div class="text-4xl mb-2">📦</div>
            <h2 class="text-xl font-bold text-green-600">我的檢貨任務</h2>
            <p class="text-gray-500 mt-1">分區發料作業</p>
        </div>
        <div class="bg-white rounded-xl shadow p-5 card-hover cursor-pointer" onclick="redirectWithUser('my_tasks.html')">
            <div class="text-4xl mb-2">📋</div>
            <h2 class="text-xl font-bold text-purple-600">我的盤點任務</h2>
            <p class="text-gray-500 mt-1">庫存盤點作業</p>
        </div>
        <div class="bg-white rounded-xl shadow p-5 card-hover cursor-pointer" onclick="location.href='material_transaction.html'">
            <div class="text-4xl mb-2">📋</div>
            <h2 class="text-xl font-bold text-orange-600">領退料單</h2>
            <p class="text-gray-500 mt-1">非生產領料/退料</p>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow p-5">
        <h2 class="text-lg font-bold mb-2">📌 今日工作提示</h2>
        <ul class="list-disc list-inside text-gray-700 space-y-1">
            <li>點擊「我的入庫任務」可掃描料號完成入庫。</li>
            <li>「我的檢貨任務」支援掃描條碼發料。</li>
            <li>「我的盤點任務」可掃描料號錄入實盤數量。</li>
            <li>「領退料單」用於現場臨時領料或退料，不經採購/製令流程。</li>
        </ul>
    </div>
</div>

<script>
    const API_BASE = "/api/v1";
    const token = localStorage.getItem('access_token');
    if (!token) { alert('請先登入'); location.href = 'login.html'; }

    // 解析 URL 參數
    const urlParams = new URLSearchParams(window.location.search);
    const targetUser = urlParams.get('user');
    const currentUsername = localStorage.getItem('username');
    const currentRole = localStorage.getItem('user_role');

    let displayName = currentUsername;
    let isViewingOther = false;

    if (targetUser && (currentRole === 'admin' || currentRole === 'warehouse')) {
        isViewingOther = true;
        displayName = targetUser;
        document.getElementById('welcomeMessage').innerHTML = `👥 正在查看 <strong>${escapeHtml(targetUser)}</strong> 的工作台（管理員模式）`;
        loadUserTasks(targetUser);
    } else {
        document.getElementById('welcomeMessage').innerHTML = `歡迎，${escapeHtml(currentUsername)} 👋`;
        // 也可以加載自己的任務統計（可選）
        loadUserTasks(currentUsername);
    }

    // 輔助函數：跳轉時保留 ?user 參數（如果是管理員查看他人）
    function redirectWithUser(page) {
        if (isViewingOther && targetUser) {
            window.location.href = `${page}?user=${encodeURIComponent(targetUser)}`;
        } else {
            window.location.href = page;
        }
    }

    async function loadUserTasks(username) {
        try {
            const res = await fetch(`${API_BASE}/admin/user-tasks/${encodeURIComponent(username)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || '載入失敗');
            }
            const data = await res.json();
            document.getElementById('taskStats').style.display = 'block';
            document.getElementById('inboundStat').innerText = data.inbound_tasks || 0;
            document.getElementById('pickingStat').innerText = data.picking_tasks || 0;
            document.getElementById('stocktakeStat').innerText = data.stocktake_tasks || 0;
            document.getElementById('totalStat').innerText = data.total_tasks || 0;
        } catch (e) {
            console.error(e);
            document.getElementById('taskStats').style.display = 'block';
            document.getElementById('statsTableBody').innerHTML = `<tr><td colspan="2" class="text-center text-red-500">載入失敗：${e.message}</td></tr>`;
        }
    }

    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));
    }

    function logout() {
        localStorage.clear();
        location.href = 'login.html';
    }
</script>
</body>
</html>
