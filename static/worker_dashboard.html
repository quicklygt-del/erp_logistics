<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>倉管員工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            border: 1px solid #e5e7eb;
            padding: 0.5rem;
            text-align: left;
            vertical-align: top;
        }
        .data-table th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        /* 手机优化 */
        @media (max-width: 640px) {
            .task-grid { gap: 0.75rem; }
            .task-card { padding: 1rem 0.5rem; }
            .task-icon { font-size: 2rem; }
            .task-title { font-size: 1rem; }
            .btn-mobile { padding: 0.75rem 1rem; font-size: 0.9rem; }
            .welcome-text { font-size: 0.9rem; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4">
<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
        <h1 class="text-2xl font-bold">📦 倉管員工作台</h1>
        <div class="space-x-2">
            <a href="stock_query.html" class="bg-blue-500 text-white px-3 py-2 rounded text-sm inline-block">📊 庫存查詢</a>
            <a href="history.html" class="bg-blue-500 text-white px-3 py-2 rounded text-sm inline-block">📜 歷史紀錄</a>
            <a href="reprint_qr.html" class="bg-blue-500 text-white px-3 py-2 rounded text-sm inline-block">🖨️ QR列印</a>
            <button onclick="logout()" class="bg-red-500 text-white px-3 py-2 rounded text-sm">登出</button>
        </div>
    </div>

    <p class="text-gray-600 mb-4 welcome-text" id="welcomeMessage">載入中...</p>

    <!-- 任務統計卡片（僅主管可見，倉管員不顯示） -->
    <div id="taskStats" class="bg-white rounded-xl shadow p-4 mb-6" style="display: none;">
        <h2 class="text-lg font-bold mb-2">📊 任務統計</h2>
        <div class="overflow-x-auto">
            <table class="data-table text-sm">
                <thead class="bg-gray-50"><tr><th class="p-2">任務類型</th><th>待處理數量</th></tr></thead>
                <tbody id="statsTableBody">
                    <tr><td class="p-2">入庫任務</td><td id="inboundStat">-</td></tr>
                    <tr><td class="p-2">檢貨任務</td><td id="pickingStat">-</td></tr>
                    <tr><td class="p-2">盤點任務</td><td id="stocktakeStat">-</td></tr>
                    <tr class="font-bold"><td class="p-2">合計</td><td id="totalStat">-</td></tr>
                </tbody>
            </table>
        </div>
        <div class="mt-2 text-xs text-gray-500">※ 僅顯示未完成的任務數量</div>
    </div>

    <!-- 任務卡片區（手機優化：減少內邊距、增大點擊區域） -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 task-grid">
        <div class="bg-white rounded-xl shadow p-3 task-card card-hover cursor-pointer text-center" onclick="redirectWithUser('my_inbound_tasks.html')">
            <div class="text-3xl mb-1 task-icon">📥</div>
            <h2 class="text-md font-bold text-blue-600 task-title">入庫任務</h2>
            <p class="text-xs text-gray-500">執行入庫</p>
        </div>
        <div class="bg-white rounded-xl shadow p-3 task-card card-hover cursor-pointer text-center" onclick="redirectWithUser('my_picking_tasks.html')">
            <div class="text-3xl mb-1 task-icon">📦</div>
            <h2 class="text-md font-bold text-green-600 task-title">檢貨任務</h2>
            <p class="text-xs text-gray-500">分區發料</p>
        </div>
        <div class="bg-white rounded-xl shadow p-3 task-card card-hover cursor-pointer text-center" onclick="redirectWithUser('my_tasks.html')">
            <div class="text-3xl mb-1 task-icon">📋</div>
            <h2 class="text-md font-bold text-purple-600 task-title">盤點任務</h2>
            <p class="text-xs text-gray-500">庫存盤點</p>
        </div>
        <div class="bg-white rounded-xl shadow p-3 task-card card-hover cursor-pointer text-center" onclick="location.href='material_transaction.html'">
            <div class="text-3xl mb-1 task-icon">📄</div>
            <h2 class="text-md font-bold text-orange-600 task-title">領退料單</h2>
            <p class="text-xs text-gray-500">臨時領退</p>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow p-4">
        <h2 class="text-md font-bold mb-2">📌 今日工作提示</h2>
        <ul class="list-disc list-inside text-gray-700 text-sm space-y-1">
            <li>點擊「入庫任務」可掃描料號完成入庫。</li>
            <li>「檢貨任務」支援掃描條碼發料。</li>
            <li>「盤點任務」可掃描料號錄入實盤數量。</li>
            <li>「領退料單」用於現場臨時領料/退料。</li>
        </ul>
    </div>
</div>

<script>
    const API_BASE = "/api/v1";
    const token = localStorage.getItem('access_token');
    if (!token) { alert('請先登入'); location.href = 'login.html'; }

    const urlParams = new URLSearchParams(window.location.search);
    const targetUser = urlParams.get('user');
    const currentUsername = localStorage.getItem('username');
    const currentRole = localStorage.getItem('user_role');

    let isViewingOther = false;
    if (targetUser && (currentRole === 'admin' || currentRole === 'warehouse')) {
        isViewingOther = true;
        document.getElementById('welcomeMessage').innerHTML = `👥 正在查看 <strong>${escapeHtml(targetUser)}</strong> 的工作台（管理員模式）`;
        // 主管可以查看他人統計，但倉管員永遠不會進到這裡
        loadUserTasks(targetUser);
    } else {
        document.getElementById('welcomeMessage').innerHTML = `歡迎，${escapeHtml(currentUsername)} 👋`;
        // 倉管員不顯示任務統計區塊，也不呼叫API
        if (currentRole !== 'operator') {
            // 非operator（如admin/warehouse查看自己）也顯示統計
            loadUserTasks(currentUsername);
        }
    }

    function redirectWithUser(page) {
        if (isViewingOther && targetUser) {
            window.location.href = `${page}?user=${encodeURIComponent(targetUser)}`;
        } else {
            window.location.href = page;
        }
    }

    async function loadUserTasks(username) {
        const statsDiv = document.getElementById('taskStats');
        try {
            const res = await fetch(`${API_BASE}/admin/user-tasks/${encodeURIComponent(username)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();
            statsDiv.style.display = 'block';
            document.getElementById('inboundStat').innerText = data.inbound_tasks || 0;
            document.getElementById('pickingStat').innerText = data.picking_tasks || 0;
            document.getElementById('stocktakeStat').innerText = data.stocktake_tasks || 0;
            document.getElementById('totalStat').innerText = data.total_tasks || 0;
        } catch (e) {
            console.error(e);
            statsDiv.style.display = 'block';
            document.getElementById('statsTableBody').innerHTML = `<tr><td colspan="2" class="text-center text-red-500 p-2">載入失敗：${e.message}</td></tr>`;
        }
    }

    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));
    }

    function logout() { localStorage.clear(); location.href = 'login.html'; }
</script>
</body>
</html>
