<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>智慧庫存查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .data-table {
            table-layout: fixed;
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            border: 1px solid #e5e7eb;
            padding: 0.5rem;
            text-align: left;
            vertical-align: top;
            word-break: break-word;
        }
        .data-table th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        .warehouse-table th:nth-child(1) { width: 20%; }
        .warehouse-table th:nth-child(2) { width: 15%; }
        .warehouse-table th:nth-child(3) { width: 20%; }
        .warehouse-table th:nth-child(4) { width: 20%; }
        .warehouse-table th:nth-child(5) { width: 10%; }
        .document-table th:nth-child(1) { width: 20%; }
        .document-table th:nth-child(2) { width: 25%; }
        .document-table th:nth-child(3) { width: 25%; }
        .document-table th:nth-child(4) { width: 30%; }
        .material-table th:nth-child(1) { width: 40%; }
        .material-table th:nth-child(2) { width: 30%; }
        /* 手機優化 */
        @media (max-width: 640px) {
            .tab-buttons {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .query-area {
                flex-direction: column;
                gap: 0.5rem;
            }
            .query-area > div {
                width: 100%;
            }
            .query-area button {
                width: 100%;
            }
            .data-table th, .data-table td {
                font-size: 0.7rem;
                padding: 0.3rem;
            }
        }
    </style>
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="bg-gray-500 text-white px-3 py-1 rounded text-sm">← 返回</button>
            <h1 class="text-3xl font-bold">📊 智慧庫存查詢系統</h1>
        </div>
    </div>

    <div class="flex flex-wrap gap-2 mb-4 border-b pb-2 tab-buttons">
        <button id="tabWarehouseBtn" class="px-4 py-2 bg-blue-600 text-white rounded">🏚️ 依倉別查詢</button>
        <button id="TabDocumentBtn" class="px-4 py-2 bg-gray-500 text-white rounded">📄 依單據查詢</button>
        <button id="TabMaterialBtn" class="px-4 py-2 bg-gray-500 text-white rounded">🔍 依料號查詢</button>
    </div>

    <!-- 依倉別查詢 -->
    <div id="warehousePanel" class="bg-white rounded shadow p-4">
        <div class="flex flex-wrap gap-3 items-end query-area">
            <div class="flex-1"><label class="block text-sm font-medium">選擇倉庫</label><select id="warehouseSelect" class="border p-2 rounded w-full"><option value="">-- 請選擇 --</option></select></div>
            <div class="flex-1"><label class="block text-sm font-medium">關鍵字 (料號/品名)</label><input type="text" id="warehouseSearch" placeholder="輸入關鍵字" class="border p-2 rounded w-full"></div>
            <button id="searchWarehouseBtn" class="bg-green-600 text-white px-4 py-2 rounded">查詢</button>
        </div>
        <div id="warehouseResult" class="mt-4 overflow-x-auto"><table class="data-table warehouse-table"><thead class="bg-gray-50"><tr><th>單據編號</th><th>料號</th><th>品名</th><th>規格</th><th>數量</th></tr></thead><tbody id="warehouseTbody"><tr><td colspan="5" class="text-center py-4">請選擇倉庫並查詢</td></tr></tbody></table></div>
        <div id="warehousePagination" class="flex justify-between items-center mt-3"></div>
    </div>

    <!-- 依單據查詢 -->
    <div id="documentPanel" class="bg-white rounded shadow p-4 hidden">
        <div class="flex gap-2 items-end"><div class="flex-1"><label class="block text-sm font-medium">選擇未完成單據</label><select id="docSelect" class="border p-2 rounded w-full"><option value="">-- 請選擇 --</option></select></div><button id="searchDocBtn" class="bg-green-600 text-white px-4 py-2 rounded">查詢</button></div>
        <div id="docResult" class="mt-4"><div id="docInfo" class="bg-gray-50 p-2 text-sm mb-2"></div><div class="overflow-x-auto"><table class="data-table document-table"><thead class="bg-gray-50"><tr><th>料號</th><th>品名</th><th>規格</th><th>倉別</th></tr></thead><tbody id="docTbody"></tbody></table></div></div>
    </div>

    <!-- 依料號查詢 -->
    <div id="materialPanel" class="bg-white rounded shadow p-4 hidden">
        <div class="flex gap-2 items-end"><div class="flex-1"><label class="block text-sm font-medium">料號</label><input type="text" id="materialCode" placeholder="請輸入料號" class="border p-2 rounded w-full"></div><button id="searchMaterialBtn" class="bg-green-600 text-white px-4 py-2 rounded">查詢</button></div>
        <div id="materialResult" class="mt-4"><div id="materialInfo" class="bg-gray-50 p-2 text-sm mb-2"></div><div class="overflow-x-auto"><table class="data-table material-table"><thead class="bg-gray-50"><tr><th>倉庫</th><th>數量</th></tr></thead><tbody id="materialTbody"></tbody></table></div></div>
    </div>
</div>

<script>
    const API_BASE = "/api/v1";
    let token = localStorage.getItem('access_token');
    if (!token) { alert('請先登入'); location.href = 'login.html'; }

    let currentWarehousePage = 0, warehouseTotal = 0, warehouseLimit = 20;

    async function apiFetch(url, opts = {}) {
        opts.headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
            ...(opts.headers || {})
        };
        const res = await fetch(url, opts);
        if (res.status === 401) { alert('登入過期'); localStorage.removeItem('access_token'); location.href = 'login.html'; throw new Error('Unauthorized'); }
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

    const tradMap = {
        "待验仓": "待驗倉", "不良品仓": "不良品倉", "待入库仓": "待入庫倉", "待出库仓": "待出庫倉",
        "包装仓": "包裝倉", "包装成品仓": "包裝成品倉", "待出货仓": "待出貨倉",
        "待收货": "待收貨", "待验": "待驗", "检验完成": "檢驗完成", "待发料": "待發料",
        "待包装": "待包裝", "待出库": "待出庫", "已出库": "已出庫", "已入库": "已入庫",
        "待指派": "待指派", "待盘点": "待盤點", "进行中": "進行中", "已结束": "已結束"
    };
    function toTraditional(str) { return tradMap[str] || str; }

    async function loadWarehouses() {
        try {
            const warehouses = await apiFetch(`${API_BASE}/inventory/warehouses`);
            const select = document.getElementById('warehouseSelect');
            select.innerHTML = '<option value="">-- 請選擇 --</option>';
            warehouses.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w;
                opt.textContent = toTraditional(w);
                select.appendChild(opt);
            });
        } catch(e) { console.error(e); alert('載入倉庫失敗'); }
    }

    async function loadPendingDocuments() {
        try {
            const docs = await apiFetch(`${API_BASE}/inventory/pending-documents`);
            const select = document.getElementById('docSelect');
            select.innerHTML = '<option value="">-- 請選擇 --</option>';
            docs.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.doc_number;
                opt.textContent = `${d.doc_number} - ${d.status}`;
                select.appendChild(opt);
            });
        } catch(e) { console.error(e); alert('載入單據失敗'); }
    }

    async function searchWarehouse(resetPage = true) {
        if (resetPage) currentWarehousePage = 0;
        const warehouse = document.getElementById('warehouseSelect').value;
        if (!warehouse) { alert('請選擇倉庫'); return; }
        const search = document.getElementById('warehouseSearch').value;
        const params = new URLSearchParams();
        params.append('warehouse', warehouse);
        if (search) params.append('search', search);
        params.append('limit', warehouseLimit);
        params.append('offset', currentWarehousePage * warehouseLimit);
        try {
            const data = await apiFetch(`${API_BASE}/inventory/stock-by-warehouse?${params.toString()}`);
            warehouseTotal = data.total;
            const tbody = document.getElementById('warehouseTbody');
            if (!data.data.length) {
                tbody.innerHTML = '<td><td colspan="5" class="text-center py-4">無資料</tbody>';
            } else {
                tbody.innerHTML = data.data.map(item => `
                    <tr>
                        <td class="p-2">${escapeHtml(item.doc_number)}<\/td>
                        <td class="p-2">${escapeHtml(item.material_code)}<\/td>
                        <td class="p-2">${escapeHtml(item.name)}<\/td>
                        <td class="p-2">${escapeHtml(item.spec)}<\/td>
                        <td class="p-2 text-right">${item.qty}<\/td>
                    <\/tr>
                `).join('');
            }
            const totalPages = Math.ceil(warehouseTotal / warehouseLimit);
            const paginationDiv = document.getElementById('warehousePagination');
            paginationDiv.innerHTML = `
                <span>第 ${currentWarehousePage+1} / ${totalPages || 1} 頁，共 ${warehouseTotal} 筆</span>
                <div>
                    <button id="prevPage" ${currentWarehousePage===0 ? 'disabled' : ''} class="border px-2 py-1 rounded mr-1">上一頁</button>
                    <button id="nextPage" ${(currentWarehousePage+1)*warehouseLimit >= warehouseTotal ? 'disabled' : ''} class="border px-2 py-1 rounded">下一頁</button>
                </div>
            `;
            document.getElementById('prevPage')?.addEventListener('click', () => { currentWarehousePage--; searchWarehouse(false); });
            document.getElementById('nextPage')?.addEventListener('click', () => { currentWarehousePage++; searchWarehouse(false); });
        } catch(e) { alert('查詢失敗: ' + e.message); }
    }

    async function searchDocument() {
        const docNumber = document.getElementById('docSelect').value;
        if (!docNumber) { alert('請選擇單據'); return; }
        try {
            const data = await apiFetch(`${API_BASE}/inventory/by-document/${encodeURIComponent(docNumber)}`);
            const statusTW = toTraditional(data.status);
            document.getElementById('docInfo').innerHTML = `<strong>${data.doc_number}</strong> (${data.doc_type === 'purchase' ? '採購單' : '製令單'}) - 狀態：${escapeHtml(statusTW)}`;
            const tbody = document.getElementById('docTbody');
            if (!data.items.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4">無明細</tbody>';
                return;
            }
            const materialWarehouseMap = new Map();
            const materialCodes = data.items.map(item => item.material_code);
            const fetchPromises = materialCodes.map(async (code) => {
                try {
                    const stockData = await apiFetch(`${API_BASE}/inventory/by-material/${encodeURIComponent(code)}`);
                    if (stockData.distribution && stockData.distribution.length) {
                        const warehouses = stockData.distribution.map(d => toTraditional(d.warehouse));
                        materialWarehouseMap.set(code, warehouses);
                    }
                } catch(e) { console.warn(`無法取得料號 ${code} 的庫存分佈`, e); }
            });
            await Promise.all(fetchPromises);
            tbody.innerHTML = data.items.map(item => {
                let warehousesHtml = '';
                if (item.distribution && item.distribution.length) {
                    const whNames = item.distribution.map(d => toTraditional(d.warehouse));
                    warehousesHtml = whNames.join('、');
                } else {
                    const whNames = materialWarehouseMap.get(item.material_code) || [];
                    warehousesHtml = whNames.length ? whNames.join('、') : '－';
                }
                return `
                    <tr>
                        <td class="p-2">${escapeHtml(item.material_code)}<\/td>
                        <td class="p-2">${escapeHtml(item.material_name)}<\/td>
                        <td class="p-2">${escapeHtml(item.spec)}<\/td>
                        <td class="p-2">${escapeHtml(warehousesHtml)}<\/td>
                    <\/tr>
                `;
            }).join('');
        } catch(e) { alert('查詢失敗: ' + e.message); }
    }

    async function searchMaterial() {
        const materialCode = document.getElementById('materialCode').value.trim();
        if (!materialCode) { alert('請輸入料號'); return; }
        try {
            const data = await apiFetch(`${API_BASE}/inventory/by-material/${encodeURIComponent(materialCode)}`);
            document.getElementById('materialInfo').innerHTML = `<strong>${escapeHtml(data.material_code)}</strong> - ${escapeHtml(data.name)} (${escapeHtml(data.spec)})`;
            const tbody = document.getElementById('materialTbody');
            if (!data.distribution.length) {
                tbody.innerHTML = '<tr><td colspan="2" class="text-center py-4">無分佈資料</tbody>';
            } else {
                tbody.innerHTML = data.distribution.map(d => `
                    <tr>
                        <td class="p-2">${escapeHtml(toTraditional(d.warehouse))}<\/td>
                        <td class="p-2 text-right">${d.qty}<\/td>
                    <\/tr>
                `).join('');
            }
        } catch(e) { alert('查詢失敗: ' + e.message); }
    }

    function showPanel(panel) {
        document.getElementById('warehousePanel').style.display = panel === 'warehouse' ? 'block' : 'none';
        document.getElementById('documentPanel').style.display = panel === 'document' ? 'block' : 'none';
        document.getElementById('materialPanel').style.display = panel === 'material' ? 'block' : 'none';
        if (panel === 'document') loadPendingDocuments();
    }

    document.getElementById('tabWarehouseBtn').onclick = () => showPanel('warehouse');
    document.getElementById('TabDocumentBtn').onclick = () => showPanel('document');
    document.getElementById('TabMaterialBtn').onclick = () => showPanel('material');
    document.getElementById('searchWarehouseBtn').onclick = () => searchWarehouse(true);
    document.getElementById('searchDocBtn').onclick = searchDocument;
    document.getElementById('searchMaterialBtn').onclick = searchMaterial;

    loadWarehouses();
    showPanel('warehouse');
</script>
</body>
</html>
